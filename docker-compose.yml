services:
  # ── Base de datos ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  # ── Caché de estado ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── Message broker ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 5

  # ── API pública (booking-api) ──────────────────────────────
  booking-api:
    build: ./booking-api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Validación y reservas (availability-service) ───────────
  availability-service:
    build: ./availability-service
    env_file: .env
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Procesamiento de pagos (payment-service) ───────────────
  payment-service:
    build: ./payment-service
    env_file: .env
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # NOTA: notification-service NO está aquí. Tú debes agregarlo
  # como parte del Tier 1. Mira la carpeta notification-service/
  # y replica el patrón de los otros servicios.
  # ── Notificaciones (notification-service) ───────────────
  notification-service:
    build: ./notification-service
    env_file: .env
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  pg_data: