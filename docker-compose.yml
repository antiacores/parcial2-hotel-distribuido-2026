services:
  # ── Base de datos ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  # ── Caché de estado ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── Message broker ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 5

  # ── API pública (booking-api) ──────────────────────────────
  booking-api:
    build: ./booking-api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/healthz || exit 1"]
      interval: 10s
      retries: 3

  # ── Validación y reservas (availability-service) ───────────
  availability-service:
    build: ./availability-service
    env_file: .env
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import pika; pika.URLParameters('${RABBITMQ_URL}')\" || exit 1"]
      interval: 15s
      retries: 3

  # ── Procesamiento de pagos (payment-service) ───────────────
  payment-service:
    build: ./payment-service
    env_file: .env
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import asyncio, aio_pika\" || exit 1"]
      interval: 15s
      retries: 3

  # ── Notificaciones (notification-service) ──────────────────
  notification-service:
    build: ./notification-service
    env_file: .env
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import pika\" || exit 1"]
      interval: 15s
      retries: 3

volumes:
  pg_data: